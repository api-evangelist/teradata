  - type: Integrations
    data:
      - name: dbt
        description: >-
          dbt adapter for Teradata Vantage enabling data transformations using
          dbt workflows.
      - name: Apache Airflow
        description: >-
          Airflow provider for orchestrating Teradata data pipeline workflows.
      - name: Dagster
        description: >-
          Dagster integration for Teradata data orchestration and observability.
      - name: Airbyte
        description: >-
          Airbyte connector for ELT data pipelines to and from Teradata.
      - name: Fivetran
        description: >-
          Fivetran destination connector for automated data loading into
          Teradata.
      - name: MuleSoft
        description: >-
          MuleSoft connector for integrating Teradata with enterprise
          application networks.
      - name: Dataiku
        description: >-
          Dataiku plugin for running analytics within the Teradata Vantage
          environment.
      - name: LangChain
        description: >-
          LangChain integration for using Teradata as a vector store and data
          source in AI applications.
      - name: Apache Iceberg
        description: >-
          Teradata support for Apache Iceberg open table format for lakehouse
          analytics.
  - type: Features
    data:
      - name: VantageCloud
        description: >-
          Cloud-native analytics platform available on AWS, Azure, and Google
          Cloud.
      - name: ClearScape Analytics
        description: >-
          Advanced analytics engine with machine learning, graph analytics, and
          AI capabilities built into Vantage.
      - name: QueryGrid
        description: >-
          Data fabric for multi-system analytics enabling queries across
          Teradata, Hadoop, Spark, and cloud object storage.
      - name: ModelOps
        description: >-
          Model lifecycle management for deploying, monitoring, and governing
          machine learning models.
      - name: AI Unlimited
        description: >-
          On-demand AI and ML engine for exploratory analytics without
          infrastructure management.
      - name: Open Table Formats
        description: >-
          Support for Apache Iceberg and open table formats for lakehouse
          analytics.
  - type: UseCases
    data:
      - name: Enterprise Data Warehousing
        description: >-
          Centralized data warehousing with petabyte-scale analytics for
          enterprise reporting and BI.
      - name: Advanced Analytics
        description: >-
          In-database machine learning, statistical analysis, and predictive
          modeling at scale.
      - name: Multi-Cloud Analytics
        description: >-
          Connected analytics across AWS, Azure, and Google Cloud with data
          fabric integration.
      - name: AI and ML Operations
        description: >-
          End-to-end machine learning model lifecycle management with ModelOps.
      - name: Real-Time Data Integration
        description: >-
          Real-time data ingestion and analytics with QueryGrid cross-system
          query federation.
