aid: teradata
name: Teradata
description: >-
  Teradata provides enterprise analytics and data management solutions. The
  Teradata VantageCloud platform delivers connected multi-cloud data analytics
  with capabilities for data warehousing, advanced analytics, and machine
  learning at scale. Teradata offers REST APIs for managing QueryGrid data
  fabric connections, running SQL queries, and administering platform resources.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Analytics
  - Cloud
  - Data Management
  - Data Warehousing
  - Database
  - Enterprise
  - Machine Learning
  - SQL
url: https://www.teradata.com
created: '2026-04-18'
modified: '2026-04-18'
specificationVersion: '0.19'
position: Consumer
access: 3rd-Party
apis:
  - aid: teradata:querygrid-manager-api
    name: Teradata QueryGrid Manager API
    description: >-
      REST API for centralized administration and monitoring of Teradata
      QueryGrid, the data fabric that enables seamless cross-system analytics.
      Manage data centers, systems, bridges, connectors, links, fabrics,
      networks, and node configurations. Perform diagnostic checks, software
      installations, and query monitoring across connected systems.
    humanURL: https://github.com/Teradata/querygrid-apidocs
    baseURL: https://querygrid.teradata.com/api/v1
    tags:
      - Configuration
      - Data Fabric
      - Diagnostics
      - Monitoring
      - QueryGrid
    properties:
      - type: Documentation
        url: https://github.com/Teradata/querygrid-apidocs
      - type: OpenAPI
        url: openapi/teradata-querygrid-manager-api.yaml
  - aid: teradata:query-service-api
    name: Teradata Query Service API
    description: >-
      REST API for executing SQL queries against Teradata Vantage systems.
      Provides HTTP-based access to run queries, retrieve results, and manage
      sessions for application integration and browser-based query tools.
    humanURL: https://docs.teradata.com
    baseURL: https://vantage.teradata.com/api/query/v1
    tags:
      - Query
      - REST
      - SQL
      - Vantage
    properties:
      - type: Documentation
        url: https://docs.teradata.com
      - type: OpenAPI
        url: openapi/teradata-query-service-api.yaml
